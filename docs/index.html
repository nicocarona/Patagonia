<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patagonia Copters — Panel de Operaciones</title>
<style>
  :root {
    --bg: #000000;
    --panel: #131313;
    --panel2: #1e1e1e;
    --border: #2e2e2e;
    --text: #ffffff;
    --muted: #9a9a9a;
    --blue: #ffffff;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  #login-screen {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  #login-screen h1 {
    font-size: 22px;
    margin-bottom: 4px;
  }
  #login-screen p.sub {
    color: var(--muted);
    margin-top: 0;
    margin-bottom: 24px;
    font-size: 14px;
  }
  .login-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    width: 320px;
  }
  .login-box label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
    margin-top: 14px;
  }
  .login-box input {
    width: 100%;
    padding: 10px 12px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
  }
  .login-box button, .btn {
    margin-top: 20px;
    width: 100%;
    padding: 11px;
    background: var(--blue);
    border: none;
    border-radius: 6px;
    color: #000000;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .login-box button:hover, .btn:hover { opacity: 0.9; }
  #login-error {
    color: var(--red);
    font-size: 13px;
    margin-top: 12px;
    min-height: 16px;
  }
  #app { display: none; }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  header h1 { font-size: 16px; margin: 0; }
  header .who { font-size: 13px; color: var(--muted); }
  header button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  nav {
    display: flex;
    gap: 4px;
    padding: 10px 24px 0 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-wrap: wrap;
  }
  nav button {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 10px 14px;
    cursor: pointer;
    font-size: 13px;
    border-bottom: 2px solid transparent;
  }
  nav button.active {
    color: var(--text);
    border-bottom: 2px solid var(--blue);
  }
  main {
    padding: 24px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .card h2 { font-size: 15px; margin: 0 0 12px 0; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge.ok { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge.warn { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .badge.bad { background: rgba(239,68,68,0.15); color: var(--red); }
  .loading, .empty, .error-msg { color: var(--muted); font-size: 13px; padding: 8px 0; }
  .error-msg { color: var(--red); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 700px) { .grid2 { grid-template-columns: 1fr; } }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; }
  @media (max-width: 700px) { .form-grid { grid-template-columns: 1fr; } }
  .form-grid label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
  .form-grid input, .form-grid select {
    width: 100%;
    padding: 8px 10px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
  }
  .form-actions { margin-top: 14px; display: flex; align-items: center; gap: 12px; }
  .form-actions .btn { width: auto; margin-top: 0; padding: 9px 18px; }
  .form-msg { font-size: 13px; }
  .form-msg.ok { color: var(--green); }
  .form-msg.bad { color: var(--red); }
</style>
</head>

  { id: "inventario", label: "Inventario" },
  { id: "sms", label: "SMS" },
];

async function api(base, path) {
  const res = await fetch(base + path, { headers: { Authorization: "Bearer " + TOKEN } });
  if (!res.ok) {
    const t = await res.text().catch(() => "");
    throw new Error("HTTP " + res.status + (t ? " — " + t.slice(0, 200) : ""));
  }
  return res.json();
}

async function apiPost(base, path, body) {
  const res = await fetch(base + path, {
    method: "POST",
    headers: { "Content-Type": "application/json", Authorization: "Bearer " + TOKEN },
    body: JSON.stringify(body),
  });
  let data = null;
  try { data = await res.json(); } catch (e) { /* respuesta vacía */ }
  if (!res.ok) {
    throw new Error((data && data.error) || ("HTTP " + res.status));
  }
  return data;
}

// Arma un <form> a partir de una lista de campos y lo envía por POST al
// enviarse. `fields`: [{ name, label, type, required, options, placeholder }]
function buildForm(formId, fields, onSubmitLabel) {
  const inputs = fields.map((f) => {
    const req = f.required ? "required" : "";
    if (f.type === "select") {
      const opts = f.options.map((o) => '<option value="' + escapeHtml(o.value) + '">' + escapeHtml(o.label) + "</option>").join("");
      return '<div><label>' + escapeHtml(f.label) + '</label><select name="' + f.name + '" ' + req + ">" + opts + "</select></div>";
    }
    return '<div><label>' + escapeHtml(f.label) + (f.required ? " *" : "") + '</label><input name="' + f.name + '" type="' + (f.type || "text") + '" ' + (f.placeholder ? 'placeholder="' + escapeHtml(f.placeholder) + '"' : "") + " " + req + " /></div>";
  }).join("");
  return (
    '<form id="' + formId + '" class="form-grid">' + inputs + "</form>" +
    '<div class="form-actions"><button type="button" class="btn" style="max-width:220px" onclick="submitForm(\'' + formId + '\')">' + onSubmitLabel + '</button>' +
    '<span class="form-msg" id="' + formId + '-msg"></span></div>'
  );
}

const FORM_HANDLERS = {};

async function submitForm(formId) {
  const form = document.getElementById(formId);
  const msg = document.getElementById(formId + "-msg");
  msg.textContent = "";
  msg.className = "form-msg";
  const data = {};
  for (const el of form.elements) {
    if (!el.name) continue;
    data[el.name] = el.value;
  }
  try {
    await FORM_HANDLERS[formId](data);
    msg.textContent = "Guardado correctamente.";
    msg.className = "form-msg ok";
    form.reset();
  } catch (err) {
    msg.textContent = "Error: " + err.message;
    msg.className = "form-msg bad";
  }
}

async function doLogin() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const errEl = document.getElementById("login-error");
  errEl.textContent = "";
  if (!username || !password) {
    errEl.textContent = "Completá usuario y contraseña.";
    return;
  }
  try {
    const res = await fetch(BASE.auth + "/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || "No se pudo iniciar sesión.";
      return;
    }
    TOKEN = data.token;
    ROLE = data.role;
    FULLNAME = data.fullName || username;

    b.textContent = t.label;
    b.id = "tab-" + t.id;

  TABS.forEach((t) => {

}

async function showTab(id) {

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function addMinutesToTime(hhmm, delta) {
  if (!hhmm || hhmm.indexOf(":") === -1) return "";
  const [h, m] = hhmm.split(":").map(Number);
  let total = h * 60 + m + delta;
  total = ((total % 1440) + 1440) % 1440;
  return String(Math.floor(total / 60)).padStart(2, "0") + ":" + String(total % 60).padStart(2, "0");
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

}

function syncPsv() {
  const dep = document.getElementById("fl-dep").value;
  const arr = document.getElementById("fl-arr").value;
  const psvStartEl = document.getElementById("fl-psv-start");
  const psvEndEl = document.getElementById("fl-psv-end");
  if (dep && !psvStartEl.dataset.touched) psvStartEl.value = addMinutesToTime(dep, -60);
  if (arr && !psvEndEl.dataset.touched) psvEndEl.value = addMinutesToTime(arr, 30);
  // Horas de vuelo estimadas de los horarios (el piloto puede corregirlas
  // con el valor del horómetro). Si el aterrizaje es "antes" del despegue
  // se asume cruce de medianoche.
  const hoursEl = document.getElementById("fl-hours");
  if (dep && arr && dep.includes(":") && arr.includes(":") && !hoursEl.dataset.touched) {
    const [dh, dm] = dep.split(":").map(Number);
    const [ah, am] = arr.split(":").map(Number);
    const minutes = (((ah * 60 + am) - (dh * 60 + dm)) + 1440) % 1440;
    hoursEl.value = Math.round((minutes / 60) * 100) / 100;
  }
}

async function submitFlightLog() {
  const form = document.getElementById("form-flightlog");
  const msg = document.getElementById("flightlog-msg");
  msg.textContent = "";
  msg.className = "form-msg";
  const data = {};
  for (const el of form.elements) if (el.name) data[el.name] = el.value;

  const oilAdditions = [];
  const motor = document.getElementById("oil-motor").value;
  const xmsn = document.getElementById("oil-xmsn").value;
  const cola = document.getElementById("oil-cola").value;
  if (motor) oilAdditions.push({ component: "motor", quantity: Number(motor) });
  if (xmsn) oilAdditions.push({ component: "xmsn", quantity: Number(xmsn) });
  if (cola) oilAdditions.push({ component: "cola", quantity: Number(cola) });

  try {
    const fplFile = document.getElementById("file-fpl").files[0];
    const manifestFile = document.getElementById("file-manifest").files[0];
    const fplBase64 = fplFile ? await fileToBase64(fplFile) : undefined;
    const manifestBase64 = manifestFile ? await fileToBase64(manifestFile) : undefined;

    await apiPost(BASE.dispatch, "/flight-logs", {
      tailNumber: data.tailNumber,
      pilotEmployeeCode: data.pilotEmployeeCode || undefined,
      flightDate: data.flightDate,
      actualDepartureTime: data.actualDepartureTime,
      actualArrivalTime: data.actualArrivalTime,
      psvStartTime: data.psvStartTime || undefined,
      psvEndTime: data.psvEndTime || undefined,
      flightHours: data.flightHours ? Number(data.flightHours) : undefined,
      routeFlown: data.routeFlown || undefined,
      fuelLocation: data.fuelLocation || undefined,
      fuelLiters: data.fuelLiters ? Number(data.fuelLiters) : undefined,
      technicalRemarks: data.technicalRemarks || undefined,
      oilAdditions,
      wbScreenshotBase64: WB_SCREENSHOT || undefined,
      fplScreenshotBase64: fplBase64,
      paxManifestBase64: manifestBase64,
    });
    msg.textContent = "Bitácora guardada correctamente.";
    msg.className = "form-msg ok";
    form.reset();
    WB_SCREENSHOT = null;
  } catch (err) {
    msg.textContent = "Error: " + err.message;
    msg.className = "form-msg bad";
  }
}

    '<div class="card"><h2>Agregar/actualizar habilitación de tipo</h2><p style="color:var(--muted); font-size:12px; margin-top:-6px;">El tripulante debe existir primero (creado por el maestro de datos o por sincronización).</p>' + formHtml + '</div>';
}

async function renderCombustible(main) {
  const data = await api(BASE.fuel, "/dashboard");
  let rows = (data.tanks || data).map((t) => {
    const pct = t.percentFull ?? (t.capacity_liters ? Math.round((t.current_liters / t.capacity_liters) * 100) : "-");
    return "<tr><td>" + escapeHtml(t.base || "") + "</td><td>" + escapeHtml(String(t.current_liters ?? "-")) + " L</td><td>" + escapeHtml(String(t.capacity_liters ?? "-")) + " L</td><td>" + pct + "%</td></tr>";
  }).join("");
  const formHtml = buildForm("form-uplift", [
    { name: "tailNumber", label: "Matrícula", required: true, placeholder: "XA-HEL1" },
    { name: "base", label: "Base", required: true, placeholder: "Base Norte" },
    { name: "liters", label: "Litros", type: "number", required: true, placeholder: "350" },
    { name: "upliftDate", label: "Fecha", type: "date", required: true },
  ], "Registrar repostaje (uplift)");
  FORM_HANDLERS["form-uplift"] = async (d) => {
    await apiPost(BASE.fuel, "/uplifts", {
      tailNumber: d.tailNumber,
      base: d.base,
      liters: Number(d.liters),
      upliftDate: d.upliftDate,
    });
  };
  main.innerHTML =
    '<div class="card"><h2>Tanques de combustible</h2><table><thead><tr><th>Base</th><th>Nivel actual</th><th>Capacidad</th><th>% lleno</th></tr></thead><tbody>' + (rows || '<tr><td colspan="4" class="empty">Sin datos</td></tr>') + '</tbody></table></div>' +
    '<div class="card"><h2>Registrar repostaje</h2><p style="color:var(--muted); font-size:12px; margin-top:-6px;">Rechaza si no hay stock suficiente en el tanque de esa base.</p>' + formHtml + '</div>';
}

async function renderInventario(main) {
  const data = await api(BASE.inventory, "/dashboard");
  let rows = (Array.isArray(data) ? data : []).map((p) => {
    return "<tr><td>" + escapeHtml(p.part_number || "") + "</td><td>" + escapeHtml(p.description || p.name || "") + "</td><td>" + (p.totalStock ?? p.stock ?? "-") + "</td><td>" + (p.openPurchaseOrders ?? p.open_orders ?? 0) + "</td></tr>";
  }).join("");
  const formHtml = buildForm("form-stock", [
    { name: "partId", label: "ID de parte (del catálogo)", type: "number", required: true, placeholder: "1" },
    { name: "warehouseId", label: "ID de almacén", type: "number", required: true, placeholder: "1" },
    { name: "quantity", label: "Cantidad a recibir", type: "number", required: true, placeholder: "10" },
    { name: "reference", label: "Referencia (opcional)", placeholder: "OC-0042" },
  ], "Recibir stock");
  FORM_HANDLERS["form-stock"] = async (d) => {
    await apiPost(BASE.inventory, "/stock/receive", {
      partId: Number(d.partId),
      warehouseId: Number(d.warehouseId),
      quantity: Number(d.quantity),
      reference: d.reference || undefined,
    });
  };
  main.innerHTML =
    '<div class="card"><h2>Inventario de repuestos</h2><table><thead><tr><th>Parte</th><th>Descripción</th><th>Stock</th><th>Órdenes abiertas</th></tr></thead><tbody>' + (rows || '<tr><td colspan="4" class="empty">Sin datos</td></tr>') + '</tbody></table></div>' +
    '<div class="card"><h2>Recibir stock en almacén</h2><p style="color:var(--muted); font-size:12px; margin-top:-6px;">Los IDs de parte/almacén se ven en GET /parts y GET /warehouses de este módulo.</p>' + formHtml + '</div>';
}

async function renderSms(main) {
  const data = await api(BASE.sms, "/dashboard");
  const formHtml = buildForm("form-occurrence", [
    { name: "reportDate", label: "Fecha del reporte", type: "date", required: true },
    { name: "occurrenceType", label: "Tipo", type: "select", options: [
      { value: "incident", label: "Incidente" },
      { value: "accident", label: "Accidente" },
      { value: "hazard_report", label: "Reporte de peligro" },
      { value: "near_miss", label: "Cuasi-accidente" },
    ] },
    { name: "severity", label: "Severidad", type: "select", options: [
      { value: "low", label: "Baja" },
      { value: "medium", label: "Media" },
      { value: "high", label: "Alta" },
      { value: "critical", label: "Crítica" },
    ] },
    { name: "aircraftTail", label: "Matrícula (opcional)", placeholder: "XA-HEL1" },
    { name: "description", label: "Descripción", required: true, placeholder: "Qué pasó" },
  ], "Reportar ocurrencia");
  FORM_HANDLERS["form-occurrence"] = async (d) => {
    await apiPost(BASE.sms, "/occurrences", {
      reportDate: d.reportDate,
      occurrenceType: d.occurrenceType,
      severity: d.severity,
      aircraftTail: d.aircraftTail || undefined,
      description: d.description,
    });
  };
  main.innerHTML =
    '<div class="card"><h2>Resumen de seguridad (SMS)</h2><pre style="white-space:pre-wrap; font-size:12px; color:var(--muted);">' + escapeHtml(JSON.stringify(data, null, 2)) + '</pre></div>' +
    '<div class="card"><h2>Reportar ocurrencia</h2>' + formHtml + '</div>';
}

document.getElementById("password").addEventListener("keydown", (e) => {
  if (e.key === "Enter") doLogin();
});
</script>

</body>
</html>
