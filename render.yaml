  # Cron job: corre los 7 flujos de fleet-integration/sync.js cada 15 min,
  # autenticado como la cuenta de servicio 'fleet-integration'. Apunta a las
  # URLs públicas *.onrender.com de cada servicio de arriba — Render
  # resuelve `fromService` automáticamente al nombre público una vez
  # desplegado. Si el plan free duerme un servicio, esta corrida lo
  # despierta (con ~30s de latencia) en vez de fallar silenciosamente.
  #
  # IMPORTANTE: AUTH_INTEGRATION_PASSWORD abajo usa la contraseña de
  # demostración sembrada por SEED=1 en fleet-auth-api ("changeme123" — ver
  # fleet-auth-module/README.md). Cámbiala (y actualiza el usuario
  # 'fleet-integration' vía POST /users) antes de operar con datos reales.
  - type: cron
    name: fleet-sync-job
    runtime: node
    plan: free
    rootDir: fleet-integration
    schedule: "*/15 * * * *"
    buildCommand: "true"
    startCommand: node sync.js
    envVars:
      - key: AUTH_URL
        fromService: { type: web, name: fleet-auth-api, property: hostport }
      - key: AUTH_INTEGRATION_PASSWORD
        value: "changeme123"
      - key: CORE_URL
        fromService: { type: web, name: fleet-core-api, property: hostport }
      - key: BILLING_URL
        fromService: { type: web, name: fleet-billing-api, property: hostport }
      - key: SCHEDULING_URL
        fromService: { type: web, name: fleet-scheduling-api, property: hostport }
      - key: CREW_URL
        fromService: { type: web, name: fleet-crew-api, property: hostport }
      - key: MAINTENANCE_URL
        fromService: { type: web, name: fleet-maintenance-api, property: hostport }
      - key: INVENTORY_URL
        fromService: { type: web, name: fleet-inventory-api, property: hostport }
      - key: TRAINING_URL
        fromService: { type: web, name: fleet-training-api, property: hostport }
      - key: DISPATCH_URL
        fromService: { type: web, name: fleet-dispatch-api, property: hostport }
      - key: FUEL_URL
        fromService: { type: web, name: fleet-fuel-api, property: hostport }
      - key: SMS_URL
        fromService: { type: web, name: fleet-sms-api, property: hostport }
