# ============================================================================
# Render Blueprint — despliega los once módulos + sus bases PostgreSQL + el
# job de sincronización de un solo clic. Sube este repo (con esta carpeta
# como raíz) a GitHub, luego en Render.com: New -> Blueprint -> selecciona
# el repo. Render lee este archivo automáticamente y crea todo lo de abajo.
#
# Plan "free" usado aquí para que puedas probarlo sin costo — súbelo a un
# plan pagado antes de operar con datos reales de producción (el plan free
# de Render duerme cada servicio tras 15 min sin tráfico y tarda ~30s en
# despertar en la siguiente solicitud; con 11 servicios + 1 cron job, eso
# afecta directamente a la sincronización si el módulo de destino está
# dormido — ver DEPLOY.md).
#
# AUTH_SECRET se define UNA vez en el grupo `fleet-shared` de abajo
# (`generateValue: true` — Render genera un valor aleatorio al crear el
# blueprint) y los demás servicios lo heredan vía `envVarGroups`. Es lo que
# permite que un token emitido por fleet-auth-api se verifique en los otros
# diez. No lo cambies módulo por módulo — si un solo servicio queda con un
# AUTH_SECRET distinto, los tokens dejan de validar ahí.
#
# fleet-dispatch-api (despacho de vuelo) tiene su propia base de datos y
# auth compartido, y participa del cron de sincronización solo en el flujo
# 6 (hacia fleet-fuel-api) — ver fleet-dispatch-module/README.md.
# ============================================================================

envVarGroups:
  - name: fleet-shared
    envVars:
      - key: AUTH_SECRET
        generateValue: true

databases:
  - name: fleet-auth-db
    plan: free
    databaseName: fleet_auth
    user: fleet_auth_user

  - name: fleet-core-db
    plan: free
    databaseName: fleet_core
    user: fleet_core_user

  - name: fleet-billing-db
    plan: free
    databaseName: fleet_billing
    user: fleet_billing_user

  - name: fleet-scheduling-db
    plan: free
    databaseName: fleet_scheduling
    user: fleet_scheduling_user

  - name: fleet-crew-db
    plan: free
    databaseName: fleet_crew
    user: fleet_crew_user

  - name: fleet-sms-db
    plan: free
    databaseName: fleet_sms
    user: fleet_sms_user

  - name: fleet-maintenance-db
    plan: free
    databaseName: fleet_maintenance
    user: fleet_maintenance_user

  - name: fleet-inventory-db
    plan: free
    databaseName: fleet_inventory
    user: fleet_inventory_user

  - name: fleet-dispatch-db
    plan: free
    databaseName: fleet_dispatch
    user: fleet_dispatch_user

  - name: fleet-training-db
    plan: free
    databaseName: fleet_training
    user: fleet_training_user

  - name: fleet-fuel-db
    plan: free
    databaseName: fleet_fuel
    user: fleet_fuel_user

services:
  - type: web
    name: fleet-auth-api
    runtime: node
    plan: free
    rootDir: fleet-auth-module
    buildCommand: npm install
    startCommand: node src/server.js
    envVarGroups:
      - fleet-shared
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fleet-auth-db
          property: connectionString
      - key: SEED
        value: "1"

  - type: web
    name: fleet-core-api
    runtime: node
    plan: free
    rootDir: fleet-core-module
    buildCommand: npm install
    startCommand: node src/server.js
    envVarGroups:
      - fleet-shared
